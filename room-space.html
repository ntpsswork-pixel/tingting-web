<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Space Calculator — TTGPlus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg:     #0f172a;
    --bg2:    #1a2540;
    --bg3:    #1e2d4a;
    --border: #2a3a5c;
    --gold:   #f0b429;
    --cream:  #e2e8f0;
    --muted:  #64748b;
    --ok:     #10b981;
    --warn:   #f59e0b;
    --danger: #ef4444;
    --r:      10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--cream); min-height: 100vh; font-size: 14px; overflow-x: hidden; }

  /* Topbar */
  .topbar { height: 52px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 20px; position: sticky; top: 0; z-index: 200; }
  .topbar-logo  { font-size: 16px; font-weight: 700; color: var(--gold); }
  .topbar-sep   { color: var(--border); }
  .topbar-title { font-size: 13px; font-weight: 500; }
  .topbar-right { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }

  /* Layout */
  .layout { display: flex; height: calc(100vh - 52px); overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 256px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sb-hdr  { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .sb-hdr span { flex: 1; font-size: 12px; font-weight: 600; }
  .room-list { flex: 1; overflow-y: auto; padding: 6px; min-height: 0; }
  .room-item { padding: 9px 11px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; transition: background .12s; }
  .room-item:hover  { background: var(--bg3); }
  .room-item.active { background: rgba(240,180,41,.12); border-color: rgba(240,180,41,.3); }
  .room-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .room-info { flex: 1; min-width: 0; }
  .room-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .room-pct  { font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
  .import-zone { margin: 8px; border: 2px dashed var(--border); border-radius: 8px; padding: 14px 10px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; color: var(--muted); flex-shrink: 0; display: block; }
  .import-zone:hover, .import-zone.drag-over { border-color: var(--gold); color: var(--cream); background: rgba(240,180,41,.04); }
  .import-zone p { font-size: 11px; margin-top: 4px; line-height: 1.5; }
  #file-input { display: none; }

  /* Main */
  .main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-width: 0; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: filter .12s; white-space: nowrap; }
  .btn:hover { filter: brightness(1.1); }
  .btn-gold  { background: var(--gold); color: #0f172a; }
  .btn-ghost { background: transparent; color: var(--cream); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
  .btn-red   { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-red:hover { background: rgba(239,68,68,.08); }
  .btn-sm { padding: 4px 9px; font-size: 11px; }

  /* Card */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); }
  .card-hdr { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-hdr h3 { font-size: 13px; font-weight: 600; flex: 1; }
  .card-body { padding: 16px; }

  /* Room edit */
  .edit-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
  .ifield { background: var(--bg3); border: 1px solid var(--border); color: var(--cream); border-radius: 6px; padding: 6px 10px; font-family: inherit; font-size: 13px; outline: none; transition: border-color .15s; }
  .ifield:focus { border-color: var(--gold); }
  .w-name { width: 155px; }
  .w-size { width: 78px; }
  .w-unit { width: 68px; cursor: pointer; }

  /* KPI — 2 col default, 4 col on wide */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  @media (min-width: 860px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
  .kpi { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .kpi-val   { font-size: 19px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; margin-top: 4px; line-height: 1; }
  .kpi-sub   { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .kpi.ok    { border-color: rgba(16,185,129,.3); } .kpi.ok .kpi-val  { color: var(--ok); }
  .kpi.warn  { border-color: rgba(245,158,11,.3); } .kpi.warn .kpi-val { color: var(--warn); }
  .kpi.danger{ border-color: rgba(239,68,68,.3); }  .kpi.danger .kpi-val { color: var(--danger); }

  /* Progress */
  .prog-wrap { margin-top: 12px; }
  .prog-lbl  { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .prog-bar  { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; transition: width .4s; }

  /* Diagram — KEY FIX: position:relative + explicit height + overflow:hidden */
  .diagram-wrap { background: var(--bg3); border-radius: 8px; padding: 14px; }
  .diagram-canvas {
    position: relative;          /* boxes inside use position:absolute */
    border: 2px solid rgba(240,180,41,.35);
    border-radius: 5px;
    background: rgba(240,180,41,.02);
    min-height: 80px;            /* never collapses to 0 */
    overflow: hidden;            /* clip boxes that exceed bounds */
    /* height is set inline via JS */
  }
  .eq-box {
    position: absolute;
    border-radius: 3px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 9px; text-align: center;
    border: 1.5px solid; overflow: hidden; padding: 2px;
    /* NO transition/animation that could cause reflow issues */
  }
  .eq-label { font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.6); line-height: 1.2; font-size: 9px; word-break: break-all; }
  .eq-size  { font-size: 8px; color: rgba(255,255,255,.65); margin-top: 1px; }
  .room-sz-lbl { position: absolute; bottom: 4px; right: 6px; font-size: 9px; color: rgba(240,180,41,.45); font-family: 'IBM Plex Mono', monospace; pointer-events: none; }
  .diagram-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .legend-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Table */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); }
  th { text-align: left; padding: 9px 11px; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 11px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  .chip { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--bg3); padding: 2px 6px; border-radius: 4px; color: var(--gold); }

  /* Add form */
  .add-form { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg3); }
  .add-form .field { display: flex; flex-direction: column; gap: 3px; }
  .add-form label  { font-size: 10px; color: var(--muted); }
  .add-form .ifield { padding: 6px 8px; font-size: 12px; }
  .f-name { width: 145px; } .f-num { width: 70px; } .f-unit { width: 64px; cursor: pointer; } .f-note { width: 115px; }

  /* Empty */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 44px; opacity: .35; }
  .empty h2   { font-size: 17px; color: var(--cream); }

  /* Toast */
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 12px; z-index: 9999; opacity: 0; transform: translateY(8px); transition: all .22s; pointer-events: none; max-width: 300px; }
  #toast.show  { opacity: 1; transform: translateY(0); }
  #toast.t-ok  { border-left: 3px solid var(--ok); }
  #toast.t-warn{ border-left: 3px solid var(--warn); }
  #toast.t-bad { border-left: 3px solid var(--danger); }

  /* View-only mode for non-admin */
  body.view-only .add-form       { display: none !important; }
  body.view-only .btn-red        { display: none !important; }
  body.view-only .edit-row       { pointer-events: none; opacity: .45; }
  body.view-only #sb-add-btn     { display: none !important; }
  body.view-only .view-only-badge{ display: inline-flex !important; }
  .view-only-badge { display: none; align-items: center; gap: 4px;
    font-size: 11px; color: #64748b; background: rgba(100,116,139,.1);
    border: 1px solid rgba(100,116,139,.2); border-radius: 5px; padding: 3px 8px; }

  /* Tooltip */
  .fp-tooltip {
    position: fixed; z-index: 9999; pointer-events: none;
    background: #0f172a; border: 1px solid var(--gold);
    border-radius: 8px; padding: 8px 12px; font-size: 12px;
    color: var(--cream); box-shadow: 0 4px 20px rgba(0,0,0,.6);
    max-width: 200px; display: none;
  }
  .fp-tooltip.show { display: block; }
  .fp-tooltip-name { font-weight: 600; color: var(--gold); margin-bottom: 3px; }
  .fp-tooltip-row  { color: var(--muted); font-size: 11px; line-height: 1.6; }

  /* Legend */
  .fp-legend {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 14px; border-top: 1px solid var(--border);
    background: var(--bg3); border-radius: 0 0 8px 8px;
  }
  .fp-legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--cream); background: var(--bg2);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 3px 8px; white-space: nowrap;
  }
  .fp-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .fp-legend-num { font-size: 9px; color: var(--muted); margin-left: 2px; }

  /* Edit modal */
  .eq-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px); z-index: 5000;
    display: flex; align-items: center; justify-content: center;
  }
  .eq-modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; width: 420px;
    max-width: 95vw; box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }
  .eq-modal h3 { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 18px; }
  .eq-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .eq-modal-full { grid-column: 1/-1; }
  .eq-modal label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
  .eq-modal input, .eq-modal select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--cream); border-radius: 6px; padding: 8px 10px;
    font-family: inherit; font-size: 13px; outline: none;
  }
  .eq-modal input:focus, .eq-modal select:focus { border-color: var(--gold); }
  .eq-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  @media print {
    /* ── Hide UI chrome ── */
    .topbar, .sidebar, .add-form, .btn, #toast,
    .fp-tooltip, .eq-modal-overlay, .card-hdr .btn,
    .view-only-badge { display: none !important; }

    /* ── Page setup — A4 portrait ── */
    @page { size: A4 portrait; margin: 10mm 10mm 10mm 10mm; }

    /* ── Layout ── */
    .layout { display: block !important; overflow: visible !important; height: auto !important; }
    .main   { overflow: visible !important; padding: 0 !important; gap: 6px !important; display: flex !important; flex-direction: column !important; }
    body    { background: #fff !important; color: #000 !important; font-size: 11px; }

    /* ── All cards together, no page break inside ── */
    .card { border: 1px solid #bbb !important; margin-bottom: 6px !important;
            box-shadow: none !important; background: #fff !important;
            break-inside: avoid; page-break-inside: avoid; }
    .card-hdr     { padding: 5px 10px !important; border-bottom: 1px solid #ddd !important; background: #f0f0f0 !important; }
    .card-hdr h3  { color: #000 !important; font-size: 11px !important; }
    .card-body    { padding: 6px 10px !important; overflow: visible !important; }

    /* ── Hide KPI, progress, edit row — save vertical space ── */
    .kpi-grid, .prog-wrap, .edit-row { display: none !important; }

    /* ── Show compact summary line ── */
    .print-summary { display: block !important; font-size: 10px; color: #333; padding: 2px 0 4px; }

    /* ── Floor plan canvas: respect zoom, scale-to-fit width ── */
    #fp-canvas {
      width: 100% !important;
      height: auto !important;
      max-height: 50vh !important;
      object-fit: contain !important;
      filter: invert(1) hue-rotate(180deg) !important;
      border: 1px solid #666 !important;
      border-radius: 3px !important;
      display: block !important;
    }
    .fp-legend { background: #f5f5f5 !important; padding: 4px 8px !important;
                 flex-wrap: wrap !important; gap: 3px !important; border-top: 1px solid #ddd !important; }
    .fp-legend-item { background: #fff !important; border: 1px solid #ccc !important;
                      color: #000 !important; font-size: 9px !important; padding: 2px 5px !important; }
    .fp-legend-num { color: #666 !important; }

    /* ── Compact table — fits more rows per page ── */
    table   { width: 100% !important; font-size: 9px !important; border-collapse: collapse !important; }
    thead tr { background: #e8e8e8 !important; }
    th  { background: #e8e8e8 !important; color: #222 !important;
          padding: 3px 6px !important; border: 1px solid #ccc !important; font-size: 9px !important; }
    td  { color: #000 !important; padding: 3px 6px !important;
          border: 1px solid #e0e0e0 !important; vertical-align: middle !important; }
    .chip  { background: #f0f0f0 !important; color: #333 !important;
             font-size: 8px !important; padding: 1px 4px !important; border-radius: 2px !important; }
    .tbl-wrap { overflow: visible !important; }
    tbody tr:hover { background: transparent !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">TTGPlus</span>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">คำนวณพื้นที่ห้อง</span>
  <span class="view-only-badge">👁 ดูอย่างเดียว</span>
  <span id="sync-status" style="font-size:11px;color:#64748b;margin-right:4px;"></span>
  <div class="topbar-right">
    <button class="btn btn-ghost" onclick="downloadTemplate()">⬇ Template</button>
    <button class="btn btn-ghost" onclick="exportCSV()">📊 CSV</button>
    <button class="btn btn-ghost" onclick="exportExcel()">📋 Excel</button>
    <button class="btn btn-ghost" onclick="exportRoomPDF()">📄 PDF รายห้อง</button>
    <button class="btn btn-ghost" onclick="window.print()">🖨 Print</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-hdr">
      <span>ห้องทั้งหมด</span>
      <button class="btn btn-gold btn-sm" id="sb-add-btn" onclick="addRoom()">+ เพิ่ม</button>
    </div>
    <div class="room-list" id="room-list"></div>
    <label class="import-zone" id="drop-zone">
      <div style="font-size:22px">📂</div>
      <p>Import Excel<br>ลาก .xlsx มาวาง หรือคลิกเลือกไฟล์</p>
      <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFileInput(this)">
    </label>
  </div>

  <!-- Main content -->
  <div class="main" id="main"></div>
</div>

<div id="toast"></div>
<div class="fp-tooltip" id="fp-tooltip">
  <div class="fp-tooltip-name" id="fp-tt-name"></div>
  <div class="fp-tooltip-row" id="fp-tt-info"></div>
</div>

<script>
// ────────────────────────────────────────────
//  State & constants
// ────────────────────────────────────────────
let rooms = [], activeId = null;

const COLORS = [
  {bg:'rgba(239,68,68,.5)',   bd:'#ef4444'},
  {bg:'rgba(59,130,246,.5)',  bd:'#3b82f6'},
  {bg:'rgba(16,185,129,.5)',  bd:'#10b981'},
  {bg:'rgba(168,85,247,.5)',  bd:'#a855f7'},
  {bg:'rgba(245,158,11,.5)',  bd:'#f59e0b'},
  {bg:'rgba(236,72,153,.5)',  bd:'#ec4899'},
  {bg:'rgba(6,182,212,.5)',   bd:'#06b2d4'},
  {bg:'rgba(132,204,22,.5)',  bd:'#84cc16'},
];

// ────────────────────────────────────────────
//  Utils
// ────────────────────────────────────────────
function uid()       { return '_' + Math.random().toString(36).slice(2,9); }
function toCm(v,u)   { return u === 'm' ? +v * 100 : +v; }
function roomArea(r) { return toCm(+r.width,r.unit) * toCm(+r.length,r.unit); }
function eqArea(e,ru){ const u=e.unit||ru; return toCm(+e.width,u)*toCm(+e.length,u)*(+e.quantity||1); }
function totalEq(r)  { return r.equipment.reduce((s,e)=>s+eqArea(e,r.unit),0); }
function pct(r)      { const ra=roomArea(r); return ra ? Math.min(totalEq(r)/ra*100, 999) : 0; }
function pctCls(p)   { return p<60?'ok':p<85?'warn':'danger'; }
function colorOf(i)  { return COLORS[i % COLORS.length]; }
function fmtM2(cm2)  { return (cm2/10000).toFixed(2) + ' m²'; }

// ────────────────────────────────────────────
//  Toast
// ────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show t-${type==='danger'?'bad':type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 2800);
}

// ────────────────────────────────────────────
//  Room CRUD
// ────────────────────────────────────────────
function addRoom() {
  if (!guardEdit()) return;
  const r = { id:uid(), name:`ห้องที่ ${rooms.length+1}`, width:400, length:600, unit:'cm', equipment:[] };
  rooms.push(r); activeId = r.id;
  renderAll();
}
function deleteRoom(id) {
  if (!guardEdit()) return;
  if (!confirm('ลบห้องนี้?')) return;
  rooms = rooms.filter(r => r.id !== id);
  activeId = rooms[0]?.id || null;
  renderAll();
}
function selectRoom(id) { activeId = id; renderAll(); }
function setRoom(id, key, val) {
  if (!guardEdit()) return;
  const r = rooms.find(x => x.id === id); if (!r) return;
  r[key] = (key==='width'||key==='length') ? +val : val;
  renderAll();
}

// ────────────────────────────────────────────
//  Equipment CRUD
// ────────────────────────────────────────────
function addEquip(roomId) {
  if (!guardEdit()) return;
  const r = rooms.find(x => x.id === roomId); if (!r) return;
  const name = document.getElementById('f-name').value.trim();
  const w    = parseFloat(document.getElementById('f-w').value);
  const l    = parseFloat(document.getElementById('f-l').value);
  const qty  = parseInt(document.getElementById('f-qty').value) || 1;
  const unit = document.getElementById('f-unit').value;
  const note = document.getElementById('f-note').value.trim();
  if (!name || !w || !l) { toast('กรุณากรอกชื่อและขนาด','warn'); return; }
  r.equipment.push({ id:uid(), name, width:w, length:l, quantity:qty, unit, note });
  renderAll();
  ['f-name','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-qty').value = '1';
  toast(`เพิ่ม "${name}" แล้ว`);
}
function delEquip(roomId, eqId) {
  if (!guardEdit()) return;
  const r = rooms.find(x => x.id === roomId); if (!r) return;
  r.equipment = r.equipment.filter(e => e.id !== eqId);
  renderAll();
}

// ────────────────────────────────────────────
//  Render
// ────────────────────────────────────────────

// ────────────────────────────────────────────
//  Firestore sync
// ────────────────────────────────────────────
const FIRESTORE_DOC = 'config/roomSpace';
let _db = null, _savePending = false, _saveTimer = null;

async function getDb() {
  if (_db) return _db;
  // Reuse Firebase from home.html if opened via TTGPlus, else init standalone
  if (window.db) { _db = window.db; return _db; }
  try {
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");

function saveData() {
  // Debounce — save 800ms after last change
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    const db = await getDb(); if (!db) return;
    try {
      const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await setDoc(doc(db, FIRESTORE_DOC), { rooms, activeId, updatedAt: Date.now() });
    } catch(e) { console.error('Save failed:', e); }
  }, 800);
}

async function loadData() {
  setStatus('กำลังโหลด...');
  const db = await getDb(); if (!db) { setStatus(''); return; }
  try {
    const { doc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const ref = doc(db, FIRESTORE_DOC);
    // Initial load
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const d = snap.data();
      if (Array.isArray(d.rooms)) { rooms = d.rooms; activeId = d.activeId || null; }
    }
    renderAll_noSave();
    setStatus('');
    // Real-time listener — update when others save
    onSnapshot(ref, snap => {
      if (!snap.exists()) return;
      const d = snap.data();
      if (Array.isArray(d.rooms)) {
        rooms = d.rooms; activeId = d.activeId || (rooms[0]?.id || null);
        renderAll_noSave();
      }
    });
  } catch(e) {
    console.error('Load failed:', e);
    setStatus('⚠️ โหลดไม่ได้ — ตรวจสอบการเชื่อมต่อ');
  }
}

const FP = {
  canvas: null, ctx: null, room: null,
  dpr: 1, cssW: 0, cssH: 0,
  scale: 1, baseScale: 1, zoom: 1, PAD: 44,
  boxes: [], drag: null, hovered: -1, lastClick: 0,
  PALETTE: [
    {fill:'rgba(59,130,246,.3)',  stroke:'#60a5fa', text:'#bfdbfe'},
    {fill:'rgba(16,185,129,.3)',  stroke:'#34d399', text:'#a7f3d0'},
    {fill:'rgba(245,158,11,.3)',  stroke:'#fbbf24', text:'#fde68a'},

    {fill:'rgba(168,85,247,.3)',  stroke:'#c084fc', text:'#e9d5ff'},
    {fill:'rgba(236,72,153,.3)',  stroke:'#f472b6', text:'#fce7f3'},
    {fill:'rgba(6,182,212,.3)',   stroke:'#22d3ee', text:'#cffafe'},
    {fill:'rgba(132,204,22,.3)',  stroke:'#a3e635', text:'#ecfccb'},
  ],
};

function fpSetup(canvas, cssW, cssH) {
  // Set canvas physical pixels and return a fresh ctx — called ONCE per init
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // clean scale, no accumulation
  return { ctx, dpr };
}

function fpInit(roomId) {
  const r = rooms.find(x => x.id === roomId);
  if (!r) return;
  FP.room = r;

  const canvas = document.getElementById('fp-canvas');
  if (!canvas) return;

  const rw = toCm(+r.width,  r.unit);
  const rl = toCm(+r.length, r.unit);
  if (!rw || !rl) { fpEmpty(canvas); return; }

  const PAD      = FP.PAD;
  const cssW     = Math.max(canvas.parentElement.clientWidth - 24, 200);
  const maxCssH  = Math.max(window.innerHeight - 340, 260);
  const scaleByW = (cssW - PAD * 2) / rw;
  const scaleByH = (maxCssH - PAD * 2 - 28) / rl;
  FP.baseScale   = Math.min(scaleByW, scaleByH);
  FP.scale       = FP.baseScale * FP.zoom;
  const cssH     = Math.round(rl * FP.scale) + PAD * 2 + 28;

  FP.cssW = cssW; FP.cssH = cssH;
  const {ctx, dpr} = fpSetup(canvas, cssW, cssH);
  FP.canvas = canvas; FP.ctx = ctx; FP.dpr = dpr;

  // Keep existing drag positions
  const saved = {};
  (FP.boxes || []).forEach(b => { saved[b.eqId + '_' + b.qi] = {x: b.x, y: b.y}; });

  FP.boxes = [];
  let cx = PAD, cy = PAD, rowH = 0;

  r.equipment.forEach((e, ei) => {
    const pal = FP.PALETTE[ei % FP.PALETTE.length];
    const u   = e.unit || r.unit;
    const bw  = Math.max(toCm(+e.width, u)  * FP.scale, 8);
    const bh  = Math.max(toCm(+e.length, u) * FP.scale, 8);
    const qty = +e.quantity || 1;
    for (let qi = 0; qi < qty; qi++) {
      const key = e.id + '_' + qi;
      let bx = cx, by = cy;
      // Restore from Firestore-persisted position if available
      // Restore position + rotation from persisted _fp data
      const fp_ = e._fp && e._fp[qi];
      if (fp_) {
        const rw_ = toCm(+r.width,  r.unit) * FP.scale;
        const rl_ = toCm(+r.length, r.unit) * FP.scale;
        bx = PAD + fp_.nx * rw_;
        by = PAD + fp_.ny * rl_;
      } else if (saved[key]) {
        bx = saved[key].x; by = saved[key].y;
      } else {
        if (cx + bw > cssW - PAD) { cx = PAD; cy += rowH + 6; rowH = 0; bx = cx; by = cy; }
        cx += bw + 6; rowH = Math.max(rowH, bh);
      }
      const isRotated = fp_ && fp_.rotated;
      const finalW = isRotated ? bh : bw;
      const finalH = isRotated ? bw : bh;
      const sub_ = isRotated ? `${e.length}×${e.width} ${u}` : `${e.width}×${e.length} ${u}`;
      FP.boxes.push({ eqId: e.id, qi, idx: FP.boxes.length, label: e.name,
        sub: sub_, x: bx, y: by, w: finalW, h: finalH, pal, rotated: isRotated });
    }
  });

  fpDraw();
  fpRenderLegend();
  fpBind();
}

function fpEmpty(canvas) {
  const cssW = Math.max(canvas.parentElement.clientWidth - 24, 200);
  const {ctx} = fpSetup(canvas, cssW, 110);
  FP.canvas = canvas; FP.ctx = ctx; FP.cssW = cssW; FP.cssH = 110;
  ctx.fillStyle = '#0d1b36'; ctx.fillRect(0, 0, cssW, 110);
  ctx.fillStyle = '#475569'; ctx.font = '13px Prompt,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('กรอกขนาดห้องเพื่อดู Floor Plan', cssW / 2, 55);
}

function fpDraw() {
  const {ctx, cssW, cssH, PAD, scale, room, boxes, hovered} = FP;
  if (!ctx) return;
  const rw = toCm(+room.width,  room.unit);
  const rl = toCm(+room.length, room.unit);
  const rpw = rw * scale, rph = rl * scale;

  ctx.clearRect(0, 0, cssW, cssH);

  // Background
  ctx.fillStyle = '#0d1b36';
  ctx.fillRect(0, 0, cssW, cssH);

  // Dot grid
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  const gCm = rw > 800 ? 100 : rw > 200 ? 50 : 20;
  for (let x = 0; x <= rw; x += gCm) {
    for (let y = 0; y <= rl; y += gCm) {
      const px = PAD + x * scale, py = PAD + y * scale;
      ctx.beginPath(); ctx.arc(px, py, 1, 0, Math.PI*2); ctx.fill();
    }
  }

  // Room fill
  ctx.fillStyle = 'rgba(240,180,41,0.04)';
  ctx.fillRect(PAD, PAD, rpw, rph);

  // Room wall — thick gold
  ctx.strokeStyle = '#f0b429';
  ctx.lineWidth   = 5;
  ctx.lineJoin    = 'miter';
  ctx.strokeRect(PAD, PAD, rpw, rph);

  // Corner marks
  ctx.strokeStyle = '#f0b429';
  ctx.lineWidth   = 1.5;
  [[PAD,PAD],[PAD+rpw,PAD],[PAD,PAD+rph],[PAD+rpw,PAD+rph]].forEach(([x,y]) => {
    const s = 10;
    ctx.beginPath(); ctx.moveTo(x-s,y); ctx.lineTo(x+s,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x,y+s); ctx.stroke();
  });

  // Dimension: width (top)
  ctx.save();
  ctx.strokeStyle = 'rgba(240,180,41,0.6)'; ctx.lineWidth = 1;
  // arrow line top
  const ay = PAD - 16;
  ctx.beginPath(); ctx.moveTo(PAD,ay); ctx.lineTo(PAD+rpw,ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD,ay-4); ctx.lineTo(PAD,ay+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD+rpw,ay-4); ctx.lineTo(PAD+rpw,ay+4); ctx.stroke();
  ctx.fillStyle = '#f0b429'; ctx.font = 'bold 11px "IBM Plex Mono",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`${room.width} ${room.unit}`, PAD + rpw/2, ay);
  ctx.restore();

  // Dimension: length (left)
  ctx.save();
  ctx.translate(PAD - 18, PAD + rph/2);
  ctx.rotate(-Math.PI/2);
  ctx.strokeStyle = 'rgba(240,180,41,0.6)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-rph/2,0); ctx.lineTo(rph/2,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-rph/2,-4); ctx.lineTo(-rph/2,4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rph/2,-4);  ctx.lineTo(rph/2,4);  ctx.stroke();
  ctx.fillStyle = '#f0b429'; ctx.font = 'bold 11px "IBM Plex Mono",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`${room.length} ${room.unit}`, 0, 0);
  ctx.restore();

  // Equipment boxes
  boxes.forEach((b, idx) => {
    const isHov  = idx === hovered;
    const isDrag = FP.drag && FP.drag.boxIdx === idx;

    // Glow
    if (isHov || isDrag) {
      ctx.shadowColor = b.pal.stroke; ctx.shadowBlur = 14;
    }

    ctx.fillStyle = isDrag
      ? b.pal.stroke + '80'
      : b.pal.fill;
    fpRoundRect(ctx, b.x, b.y, b.w, b.h, 4);
    ctx.fill();

    ctx.shadowBlur  = 0;
    ctx.strokeStyle = b.pal.stroke;
    ctx.lineWidth   = isHov || isDrag ? 2.5 : 1.5;
    fpRoundRect(ctx, b.x, b.y, b.w, b.h, 4);
    ctx.stroke();

    // Rotate hint icon on hover
    if (isHov && !isDrag && b.w > 20 && b.h > 20) {
      const iconSize = Math.min(14, b.w * 0.3, b.h * 0.3);
      const ix = b.x + b.w - iconSize - 3, iy = b.y + 3;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.arc(ix + iconSize/2, iy + iconSize/2, iconSize/2 + 2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = `${iconSize}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('↻', ix + iconSize/2, iy + iconSize/2 + 1);
    }

    // Labels — show number index when too small, full name when big enough
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const mx = b.x + b.w/2, my = b.y + b.h/2;
    if (b.w < 22 || b.h < 16) {
      // Too small: show index number only
      ctx.font = `700 ${Math.min(9, b.w-2)}px Prompt,sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.fillText(String(b.idx+1), mx, my);
    } else if (b.h > 36) {
      // Big enough: name + size
      ctx.font = `600 ${Math.min(11,b.w/5+3)}px Prompt,sans-serif`;
      ctx.fillStyle = b.pal.text;
      ctx.fillText(fpTrunc(ctx, b.label, b.w-8), mx, my - 8);
      ctx.font = '9px "IBM Plex Mono",monospace';
      ctx.fillStyle = b.pal.stroke;
      ctx.fillText(b.sub, mx, my + 8);
    } else {
      // Medium: name only
      ctx.font = `600 ${Math.min(10,b.w/5+3)}px Prompt,sans-serif`;
      ctx.fillStyle = b.pal.text;
      ctx.fillText(fpTrunc(ctx, b.label, b.w-6), mx, my);
    }
  });

  // Scale bar (bottom)
  const bx = PAD, by2 = PAD + rph + 14;
  const barPx = gCm * scale;
  ctx.strokeStyle = 'rgba(240,180,41,0.45)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(bx, by2); ctx.lineTo(bx+barPx, by2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx,      by2-4); ctx.lineTo(bx,      by2+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+barPx,by2-4); ctx.lineTo(bx+barPx,by2+4); ctx.stroke();
  ctx.fillStyle = 'rgba(240,180,41,0.5)';
  ctx.font = '10px "IBM Plex Mono",monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`${gCm} ${room.unit}`, bx + barPx + 6, by2);
}

function fpRoundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);   ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);   ctx.arcTo(x,   y+h, x,   y+h-r, r);
  ctx.lineTo(x, y+r);     ctx.arcTo(x,   y,   x+r, y,     r);
  ctx.closePath();
}

function fpTrunc(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  while (text.length > 1 && ctx.measureText(text+'…').width > maxW) text = text.slice(0,-1);
  return text + '…';
}

function fpHitTest(mx, my) {
  for (let i = FP.boxes.length - 1; i >= 0; i--) {
    const b = FP.boxes[i];
    if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) return i;
  }
  return -1;
}

function fpShowTooltip(b, evt) {
  const tt = document.getElementById('fp-tooltip'); if (!tt) return;
  document.getElementById('fp-tt-name').textContent = `${b.idx+1}. ${b.label}`;
  document.getElementById('fp-tt-info').innerHTML =
    `ขนาด: ${b.sub}<br>พื้นที่: ${fmtM2(b.w/FP.scale * b.h/FP.scale)}`;
  tt.classList.add('show');
  fpMoveTooltip(evt);
}
function fpMoveTooltip(evt) {
  const tt = document.getElementById('fp-tooltip'); if (!tt) return;
  const t = evt.touches ? evt.touches[0] : evt;
  tt.style.left = (t.clientX + 14) + 'px';
  tt.style.top  = (t.clientY - 10) + 'px';
}
function fpHideTooltip() {
  const tt = document.getElementById('fp-tooltip'); if (tt) tt.classList.remove('show');
}

function fpRenderLegend() {
  const el = document.getElementById('fp-legend'); if (!el || !FP.room) return;
  if (!FP.room.equipment.length) { el.innerHTML = ''; return; }
  // Deduplicate by eqId (show each equipment once)
  const seen = new Set();
  const items = FP.boxes.filter(b => { if (seen.has(b.eqId)) return false; seen.add(b.eqId); return true; });
  el.innerHTML = items.map(b =>
    `<div class="fp-legend-item">
      <div class="fp-legend-dot" style="background:${b.pal.stroke}"></div>
      <span>${b.idx+1}</span>
      <span>${b.label}</span>
      <span class="fp-legend-num">${b.sub}${b.rotated?' ↻':''}</span>
    </div>`
  ).join('');
}

function fpSavePositions() {
  // Save each box position back to equipment._fp so it persists in Firestore
  if (!FP.room) return;
  FP.boxes.forEach(b => {
    const r = rooms.find(x => x.id === FP.room.id); if (!r) return;
    const e = r.equipment.find(x => x.id === b.eqId); if (!e) return;
    if (!e._fp) e._fp = {};
    if (!e._fp[b.qi]) e._fp[b.qi] = {};
    // Store normalised position (0-1 ratio of room size) so it survives zoom/resize
    const rw = toCm(+r.width, r.unit) * FP.scale;
    const rl = toCm(+r.length, r.unit) * FP.scale;
    e._fp[b.qi] = {
      nx: (b.x - FP.PAD) / rw,
      ny: (b.y - FP.PAD) / rl,
      rotated: !!b.rotated
    };
  });
  saveData();
}

function fpRotateBox(idx) {
  const b = FP.boxes[idx]; if (!b) return;
  // Swap w <-> h, keep center position
  const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
  [b.w, b.h] = [b.h, b.w];
  b.x = cx - b.w / 2; b.y = cy - b.h / 2;
  // Clamp inside room
  const PAD = FP.PAD;
  const rw = toCm(+FP.room.width,  FP.room.unit) * FP.scale;
  const rl = toCm(+FP.room.length, FP.room.unit) * FP.scale;
  b.x = Math.max(PAD, Math.min(b.x, PAD + rw - b.w));
  b.y = Math.max(PAD, Math.min(b.y, PAD + rl - b.h));
  // Toggle sub label (swap dimensions display)
  const parts = b.sub.split('×');
  if (parts.length >= 2) {
    const unit = parts[1].replace(/[0-9.]/g,'').trim();
    b.sub = parts[1].replace(/[^0-9.]/g,'').trim() + '×' + parts[0].trim() + ' ' + unit;
  }
  b.rotated = !b.rotated;
  fpDraw(); fpRenderLegend();
  fpSavePositions();
  toast('หมุน 90° แล้ว');
}

function fpBind() {
  const canvas = FP.canvas; if (!canvas) return;
  // Remove old listeners cleanly via AbortController
  if (FP._ac) FP._ac.abort();
  FP._ac = new AbortController();
  const sig = { signal: FP._ac.signal };

  const pos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = FP.cssW / rect.width;
    const t = e.touches ? e.touches[0] : e;
    return { mx: (t.clientX - rect.left) * scaleX, my: (t.clientY - rect.top) * scaleX };
  };

  const onDown = (e) => {
    const {mx, my} = pos(e);
    const idx = fpHitTest(mx, my);
    if (idx < 0) return;
    e.preventDefault();
    // Double-click/tap = rotate 90°
    const now = Date.now();
    if (now - FP.lastClick < 300 && FP.lastClickIdx === idx) {
      fpRotateBox(idx);
      FP.lastClick = 0; return;
    }
    FP.lastClick = now; FP.lastClickIdx = idx;
    FP.drag = { boxIdx: idx, ox: mx - FP.boxes[idx].x, oy: my - FP.boxes[idx].y };
    canvas.style.cursor = 'grabbing';
  };

  const onMove = (e) => {
    const {mx, my} = pos(e);
    if (FP.drag !== null) {
      e.preventDefault();
      const b   = FP.boxes[FP.drag.boxIdx];
      const PAD = FP.PAD;
      const rw  = toCm(+FP.room.width,  FP.room.unit) * FP.scale;
      const rl  = toCm(+FP.room.length, FP.room.unit) * FP.scale;
      b.x = Math.max(PAD, Math.min(mx - FP.drag.ox, PAD + rw - b.w));
      b.y = Math.max(PAD, Math.min(my - FP.drag.oy, PAD + rl - b.h));
      fpDraw(); fpHideTooltip();
    } else {
      const prev = FP.hovered;
      FP.hovered = fpHitTest(mx, my);
      canvas.style.cursor = FP.hovered >= 0 ? 'grab' : 'default';
      if (prev !== FP.hovered) {
        fpDraw();
        if (FP.hovered >= 0) fpShowTooltip(FP.boxes[FP.hovered], e);
        else fpHideTooltip();
      } else if (FP.hovered >= 0) {
        fpMoveTooltip(e);
      }
    }
  };

  const onUp = () => {
    if (FP.drag !== null) {
      // Persist position back to equipment data
      fpSavePositions();
    }
    FP.drag = null; canvas.style.cursor = 'default'; fpHideTooltip();
  };

  canvas.addEventListener('mousedown',  onDown, sig);
  canvas.addEventListener('mousemove',  onMove, sig);
  canvas.addEventListener('mouseup',    onUp,   sig);
  canvas.addEventListener('mouseleave', onUp,   sig);
  canvas.addEventListener('touchstart', onDown, { ...sig, passive: false });
  canvas.addEventListener('touchmove',  onMove, { ...sig, passive: false });
  canvas.addEventListener('touchend',   onUp,   sig);
}

function fpSetZoom(val, roomId) {
  FP.zoom = parseFloat(val);
  const lbl = document.getElementById('fp-zoom-label');
  if (lbl) lbl.textContent = FP.zoom.toFixed(1) + '×';
  // Recompute scale and redraw without clearing box positions
  const r = rooms.find(x => x.id === roomId); if (!r) return;
  const rw = toCm(+r.width, r.unit), rl = toCm(+r.length, r.unit);
  if (!rw || !rl) return;
  const oldScale = FP.scale;
  FP.scale = FP.baseScale * FP.zoom;
  const ratio = FP.scale / oldScale;
  // Rescale existing box positions
  FP.boxes.forEach(b => {
    b.x = FP.PAD + (b.x - FP.PAD) * ratio;
    b.y = FP.PAD + (b.y - FP.PAD) * ratio;
    b.w *= ratio; b.h *= ratio;
  });
  // Resize canvas
  const cssW  = FP.cssW;
  const cssH  = Math.round(rl * FP.scale) + FP.PAD * 2 + 28;
  FP.cssH = cssH;
  const {ctx} = fpSetup(FP.canvas, cssW, cssH);
  FP.ctx = ctx;
  fpDraw(); fpRenderLegend(); fpBind();
}

function resetLayout(roomId) {
  // Clear persisted positions
  const rr = rooms.find(x=>x.id===roomId);
  if (rr) rr.equipment.forEach(e => { delete e._fp; });
  FP.boxes = []; FP.zoom = 1;
  const slider = document.getElementById('fp-zoom');
  if (slider) { slider.value = 1; }
  const lbl = document.getElementById('fp-zoom-label');
  if (lbl) lbl.textContent = '1×';
  fpInit(roomId);
  toast('Reset layout แล้ว');
}
// ────────────────────────────────────────────
//  Import Excel
// ────────────────────────────────────────────
function handleFileInput(input) { if (input.files[0]) readExcel(input.files[0]); }

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop',      e => { e.preventDefault(); dz.classList.remove('drag-over'); if (e.dataTransfer.files[0]) readExcel(e.dataTransfer.files[0]); });

function readExcel(file) {
  const rd = new FileReader();
  rd.onload = evt => {
    try {
      const wb  = XLSX.read(evt.target.result, { type:'array' });
      const wsR = wb.Sheets['rooms'], wsE = wb.Sheets['equipment'];
      if (!wsR || !wsE) { toast('ไม่พบ Sheet "rooms" หรือ "equipment"','danger'); return; }
      const rRows = XLSX.utils.sheet_to_json(wsR, { defval:'' });
      const eRows = XLSX.utils.sheet_to_json(wsE, { defval:'' });
      const nr = rRows.filter(r=>r.room_name).map(r=>({
        id:uid(), name:String(r.room_name).trim(),
        width:parseFloat(r.width)||400, length:parseFloat(r.length)||600,
        unit:String(r.unit||'cm').toLowerCase().trim(), equipment:[]
      }));
      eRows.filter(e=>e.room_name&&e.equipment_name).forEach(e=>{
        const rm = nr.find(x => x.name === String(e.room_name).trim()); if (!rm) return;
        rm.equipment.push({ id:uid(), name:String(e.equipment_name).trim(),
          width:parseFloat(e.width)||0, length:parseFloat(e.length)||0,
          quantity:parseInt(e.quantity)||1, unit:String(e.unit||rm.unit).toLowerCase().trim(),
          note:String(e.note||'').trim() });
      });
      rooms = [...rooms, ...nr];
      if (nr.length) activeId = nr[0].id;
      renderAll();
      toast(`Import สำเร็จ — ${nr.length} ห้อง`);
    } catch(err) { toast('อ่านไฟล์ไม่ได้: ' + err.message, 'danger'); }
  };
  rd.readAsArrayBuffer(file);
}

// ────────────────────────────────────────────
//  Export PDF (print-optimised)
// ────────────────────────────────────────────
// ────────────────────────────────────────────
//  Export Excel — per-room sheets
// ────────────────────────────────────────────
function exportExcel() {
  if (!rooms.length) { toast('ยังไม่มีข้อมูล','warn'); return; }
  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const sumHdr = ['ห้อง','กว้าง','ยาว','หน่วย','พื้นที่ห้อง(m²)','จำนวนอุปกรณ์','พื้นที่อุปกรณ์(m²)','%พื้นที่ใช้'];
  const sumRows = rooms.map(r => [
    r.name, r.width, r.length, r.unit,
    +(roomArea(r)/10000).toFixed(2),
    r.equipment.length,
    +(totalEq(r)/10000).toFixed(2),
    +pct(r).toFixed(1)
  ]);
  const wsSum = XLSX.utils.aoa_to_sheet([sumHdr, ...sumRows]);
  wsSum['!cols'] = [22,8,8,6,16,14,18,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, wsSum, 'สรุปทุกห้อง');

  // One sheet per room
  rooms.forEach(r => {
    const ra = roomArea(r);
    const hdr = ['#','ชื่ออุปกรณ์','กว้าง','ยาว','หน่วย','จำนวน','พื้นที่(m²)','%ห้อง','หมายเหตุ'];
    const rows = r.equipment.map((e,i) => {
      const ea = eqArea(e,r.unit);
      return [i+1, e.name, e.width, e.length, e.unit||r.unit, e.quantity,
              +(ea/10000).toFixed(2), ra?(+(ea/ra*100).toFixed(1)):0, e.note||''];
    });
    // Summary footer
    rows.push(['','รวม','','','','',+(totalEq(r)/10000).toFixed(2),+pct(r).toFixed(1),'']);
    const ws = XLSX.utils.aoa_to_sheet([hdr, ...rows]);
    ws['!cols'] = [4,24,8,8,6,8,12,8,16].map(w=>({wch:w}));
    // Safe sheet name (max 31 chars, no special chars)
    const sheetName = r.name.replace(/[\/:*?[\]]/g,'').slice(0,31);
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  });

  XLSX.writeFile(wb, `room-space-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Export Excel เรียบร้อย');
}

// ────────────────────────────────────────────
//  Export PDF per-room (print with reset zoom)
// ────────────────────────────────────────────
function exportRoomPDF() {
  if (!rooms.length) { toast('ยังไม่มีข้อมูล','warn'); return; }
  // Print at current zoom — CSS scales canvas to fit page width automatically
  toast('กำลังเตรียม PDF...');
  setTimeout(() => window.print(), 300);
}

// ────────────────────────────────────────────
//  Export CSV
// ────────────────────────────────────────────
function exportCSV() {
  if (!rooms.length) { toast('ยังไม่มีข้อมูล','warn'); return; }
  const lines = ['ห้อง,กว้าง,ยาว,หน่วย,พื้นที่ห้อง(m²),รายการ,พื้นที่อุปกรณ์(m²),%ใช้'];
  rooms.forEach(r => {
    lines.push(`"${r.name}",${r.width},${r.length},${r.unit},${(roomArea(r)/10000).toFixed(2)},${r.equipment.length},${(totalEq(r)/10000).toFixed(2)},${pct(r).toFixed(1)}%`);
    r.equipment.forEach(e => {
      lines.push(`,"${e.name}",${e.width},${e.length},${e.unit||r.unit},,,${(eqArea(e,r.unit)/10000).toFixed(2)},จำนวน:${e.quantity}`);
    });
  });
  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type:'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url;
  a.download = `room-space-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('Export CSV เรียบร้อย');
}

// ────────────────────────────────────────────
//  Download Template
// ────────────────────────────────────────────
function downloadTemplate() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['room_name','width','length','unit','note'],
    ['ห้องครัว',400,600,'cm',''], ['ห้องเก็บของ',300,500,'cm',''],
  ]), 'rooms');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    ['room_name','equipment_name','width','length','quantity','unit','note'],
    ['ห้องครัว','โต๊ะเตรียมอาหาร',60,120,2,'cm','ติดผนัง'],
    ['ห้องครัว','ตู้เย็น',65,70,1,'cm','มุมห้อง'],
    ['ห้องเก็บของ','ชั้นวางของ',40,120,3,'cm','ติดผนัง'],
  ]), 'equipment');
  XLSX.writeFile(wb, 'ttgplus_room_template.xlsx');
  toast('Download template เรียบร้อย');
}

// ────────────────────────────────────────────

loadData(); // loads from Firestore then calls renderAll
